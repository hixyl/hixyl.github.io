<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient (Night Sky/Deep Forest) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2a22" />
      <stop offset="100%" stop-color="#2d3b36" />
    </linearGradient>

    <!-- Star Glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2e3c6" stop-opacity="1" />
      <stop offset="100%" stop-color="#f2e3c6" stop-opacity="0" />
    </radialGradient>

    <!-- Jade Dragon Body Gradient -->
    <linearGradient id="jadeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#729b79" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#8ba888" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c1d5be" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Seal/Moon shape) -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />

  <!-- The "Star" (星) -->
  <circle cx="35" cy="30" r="1.5" fill="#fff" />
  <circle cx="20" cy="45" r="1" fill="#fff" opacity="0.6" />
  <circle cx="60" cy="20" r="2" fill="url(#starGlow)" />
  <path d="M60,15 L60,25 M55,20 L65,20" stroke="#f2e3c6" stroke-width="0.5" opacity="0.8" />
  <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.7" />
  <circle cx="70" cy="80" r="1" fill="#fff" opacity="0.4" />

  <!-- Abstract "Jade Dragon" (玉龙) Flowing Body -->
  <path d="M 25,75 C 20,50 45,30 65,45 C 85,60 65,85 45,85 C 30,85 40,65 50,70 C 55,72 65,65 55,55 C 45,45 25,60 25,75 Z" fill="url(#jadeGrad)" />
  
  <!-- Dragon Energy/Swirl effect lines -->
  <path d="M 35,65 C 45,55 55,60 55,55" fill="none" stroke="#e0e5df" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M 45,75 C 50,70 60,75 60,65" fill="none" stroke="#e0e5df" stroke-width="1" stroke-linecap="round" opacity="0.5" />
</svg>
