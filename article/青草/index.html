没有花之妖娆<br>
悠然静谧的林深处<br>
是一颗矮矮胖胖的青草</p>
<p>一粒种子埋下<br>
东风吹绿了眉梢<br>
细雨润湿了肢体<br>
涂抹胭脂<br>
对着泥土撒娇</p>
<p>终日幻想着变身<br>
开放含蕊的花苞<br>
日晒雨淋<br>
如幻梦般<br>
鲜花之艳眼前萦绕</p>
<p>从嫩芽到肥叶<br>
终有一日西风萧萧<br>
望眼欲穿<br>
渐枯渐瘦<br>
玉陨嫣销</p>
<p>种子随风飞舞<br>
承载着梦想去飘<br>
静待春风拂过<br>
又一片绿油油的小草</p></div><div class="page-module__y-5DuW__article-footer"><a class="page-module__y-5DuW__back-link" href="/articles/">← 返回文章列表</a></div></div></div></article><button class="BackToTop-module__5cXveq__backToTop " aria-label="回到顶部" title="回到顶部"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"></path></svg></button><!--$--><!--/$--></div></main><footer class="Footer-module__EZoWya__site-footer"><div class="Footer-module__EZoWya__footer-inner"><div class="Footer-module__EZoWya__footer-poetry">闲云潭影日悠悠，物换星移几度秋</div><div class="Footer-module__EZoWya__footer-meta"><span>© <!-- -->2026<!-- --> <!-- -->流年石刻</span><span class="Footer-module__EZoWya__dot">·</span><span>流年似水，石刻永恒</span></div></div></footer><script src="/_next/static/chunks/0bmby6ta573to.js" id="_R_" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:\"$Sreact.fragment\"\n2:I[94277,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n3:I[70119,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n4:I[39756,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n5:I[98168,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\",\"/_next/static/chunks/0m-fjq7yr4k5u.js\",\"/_next/static/chunks/0pb7gh368foa3.js\"],\"default\"]\n6:I[37457,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n7:I[79520,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"\"]\nd:I[68027,[\"/_next/static/chunks/0t_t1icbt9mq0.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\",1]\n:HL[\"/_next/static/chunks/0t4.4c0l1-7ny.css\",\"style\"]\n:HL[\"/_next/static/media/83afe278b6a6bb3c-s.p.0q-301v4kxxnr.woff2\",\"font\",{\"cro
