寂静地可怕<br>
天水相连处<br>
有一片孤舟</p>
<p>不知何处漂来<br>
也不知将漂向哪去<br>
心儿如清水般静谧<br>
孤舟随着微风摇动</p>
<p>夕阳落了<br>
夜幕低垂<br>
一尊清酒对明月独酌<br>
自由地畅饮<br>
醉卧于水面</p>
<p>水草若隐若现<br>
繁星点点闪烁<br>
庙台灯火通明<br>
不若江上荧光</p>
<p>走远了<br>
摇摆的身躯不知道前方的路<br>
朦胧的双眼看这世界好模糊<br>
驾着一叶之孤舟<br>
不问前程<br>
随风飘舞</p></div><div class="page-module__y-5DuW__article-footer"><a class="page-module__y-5DuW__back-link" href="/articles/">← 返回文章列表</a></div></div></div></article><!--$--><!--/$--></div></main><footer class="Footer-module__EZoWya__site-footer"><div class="Footer-module__EZoWya__footer-inner"><div class="Footer-module__EZoWya__footer-poetry">闲云潭影日悠悠，物换星移几度秋</div><div class="Footer-module__EZoWya__footer-meta"><span>© <!-- -->2026<!-- --> <!-- -->流年石刻</span><span class="Footer-module__EZoWya__dot">·</span><span>似水流年，刻石永恒</span></div></div></footer><script src="/_next/static/chunks/0bmby6ta573to.js" id="_R_" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:\"$Sreact.fragment\"\n2:I[94277,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n3:I[70119,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n4:I[39756,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n5:I[98168,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\",\"/_next/static/chunks/0_34_qyd2jtrw.js\",\"/_next/static/chunks/0qvvnoiw~7_-~.js\"],\"default\"]\n6:I[37457,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\"]\n7:I[79520,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"\"]\nd:I[68027,[\"/_next/static/chunks/13sgweo0d.7_z.js\",\"/_next/static/chunks/0d3shmwh5_nmn.js\"],\"default\",1]\n:HL[\"/_next/static/chunks/0g~zs8c5~_~uf.css\",\"style\"]\n:HL[\"/_next/static/media/83afe278b6a6bb3c-s.p.0q-301v4kxxnr.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/chunks/02f1pwhv5qrki.css\",\"style\"]\n:HL[\"https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css\",\"style\"]\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"c\":[\"\",\"arti
